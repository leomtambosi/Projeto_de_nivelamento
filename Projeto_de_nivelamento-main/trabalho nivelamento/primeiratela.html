<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reciclle</title>

<style>

body{
    margin:0;
    background:#d9d9d9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family: Arial, Helvetica, sans-serif;
}

.mobile{
    width:390px;
    height:844px;
    background:white;
    border-radius:40px;
    box-shadow:0 0 30px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo{
    width:140px;
    margin-bottom:10px;
    border-radius: 100%;
}

.nome{
    font-size:42px;
    font-family:cursive;
    margin:0;
}

.sub{
    color:#777;
    margin-top:5px;
}

.ola{
    margin-top:60px;
    font-size:20px;
}

.botao{
    margin-top:20px;
    width:280px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e5eff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.botao:hover{
    background:#1748c7;
}

</style>
</head>

<body>

<div class="mobile">

<img src="img/logo.png" class="logo">

<h1 class="nome">Reciclle</h1>

<p class="sub">Reciclando em Joinville</p>

<p class="ola">Olá</p>

<a href="cadastro.html">
    <button class="botao">Entrar</button>
</a>



</div>

</body>
</html>
