<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denúncias</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#d9d9d9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
}

.mobile{
    width:390px;
    height:844px;
    background:#f5f5f5;
    border-radius:40px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,0.2);
}

.topo{
    background:#1e5eff;
    height:120px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    width:70px;
    background:white;
    border-radius:50%;
}

.conteudo{
    padding:20px;
}

.header{
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    margin-bottom:20px;
}

.voltar{
    position:absolute;
    left:0;
    font-size:22px;
    color:#1e5eff;
    text-decoration:none;
}

.titulo{
    font-size:20px;
    font-weight:bold;
    color:#1e5eff;
}

.card{
    margin-bottom:20px;
}

.card h3{
    margin:0 0 10px 0;
    font-size:16px;
}

.imagem{
    width:100%;
    border-radius:6px;
    margin-bottom:10px;
}

.texto{
    font-size:13px;
    color:#333;
    margin-bottom:10px;
}

.botao{
    display:block;
    width:140px;
    text-align:center;
    background:#1e5eff;
    color:white;
    padding:8px;
    border-radius:20px;
    text-decoration:none;
    font-size:14px;
}

.divisor{
    height:1px;
    background:#aaa;
    margin:20px 0;
}

</style>
</head>

<body>

<div class="mobile">

<div class="topo">
<img src="img/logo.png" class="logo">
</div>

<div class="conteudo">

<div class="header">
<a href="opcoes.html" class="voltar">←</a>
<div class="titulo">Denúncias</div>
</div>

<div class="card">

<h3>Lixo na vigorelli</h3>

<img src="img/praia.png" class="imagem">

<div class="texto">
Grande acúmulo de lixo está poluindo nossas praias.
</div>


</div>

<div class="divisor"></div>

<div class="card">

<h3>Descartes no mangue</h3>

<img src="/img/mangue.png" class="imagem">

<div class="texto">
Descartes impróprios sendo realizados nas áreas de manguezal.
</div>

</div>

</div>

</div>

</body>

</html>
