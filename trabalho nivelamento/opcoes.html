<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opções</title>

    <style>
        *{
            box-sizing: border-box;
        }

        body{
            margin: 0;
            background: #d9d9d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
        }

        .mobile{
            width: 390px;
            height: 844px;
            background: #f5f5f5;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }

        .topo{
            background: #1e5eff;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo{
            width: 70px;
            background: white;
            border-radius: 50%;
        }

        .conteudo {
            padding: 40px 25px;
            text-align: center;
            margin-top: 100px;
        }

        .botao {
            display: block;
            background: #1e5eff;
            color: white;
            padding: 18px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 18px;
            margin: 25px 0;
        }

        .voltar{
            margin-top: 30px;
            display: inline-block;
            color: #1e5eff;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="mobile">
        <div class="topo">
            <img src="img/logo.png" class="logo">
        </div>

        <div class="conteudo">
            <a href="denuncia.html" class="botao">Denunciar</a>
            <a href="verdenuncias.html" class="botao">Ver denúncias</a>
            <a href="locais.html" class="botao">Locais de descarte</a>
            <a href="inicio.html" class="voltar">← Voltar</a>
        </div>
    </div>
</body>
</html>
