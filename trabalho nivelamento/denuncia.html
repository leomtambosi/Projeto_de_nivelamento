<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denunciar</title>

<style>
*{
    box-sizing: border-box;
}

body{
    margin: 0;
    background: #d9d9d9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
}

.mobile{
    width: 390px;
    height: 844px;
    background: #f5f5f5;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,0,0,0.2);
}

.topo{
    background: #1e5eff;
    height: 120px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo{
    width: 70px;
    background: white;
    border-radius: 50%;
}

.conteudo{
    padding: 25px;
}

.titulo{
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #1e5eff;
    margin-bottom: 25px;
}

.label{
    font-size: 15px;
    margin-bottom: 6px;
    display: block;
}

.input, .textarea{
    width: 100%;
    border: none;
    background: #e6e6e6;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 18px;
    font-size: 14px;
}

.textarea{
    height: 80px;
    resize: none;
}

.imagem-box{
    width: 90px;
    height: 70px;
    background: #e6e6e6;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    color: #777;
    margin-bottom: 25px;
}

.botao{
    width: 100%;
    background: #1e5eff;
    color: white;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    margin-bottom: 20px;
    cursor: pointer;
}

.voltar{
    text-align: center;
    color: #1e5eff;
    text-decoration: none;
    font-size: 16px;
    display: block;
}
</style>
</head>

<body>

<div class="mobile">

    <div class="topo">
        <img src="img/logo.png" class="logo">
    </div>

    <div class="conteudo">

        <div class="titulo">Denunciar</div>

        <label class="label">Descreva a denúncia</label>
        <textarea class="textarea"></textarea>

        <label class="label">Endereço</label>
        <input type="text" class="input">

        <label class="label">Imagens</label>
        <div class="imagem-box">📷</div>

        <button type="button" class="botao" onclick="window.location.href='finalizado.html'">Enviar</button>

        <a href="opcoes.html" class="voltar">← Voltar</a>

    </div>

</div>

</body>
</html>
