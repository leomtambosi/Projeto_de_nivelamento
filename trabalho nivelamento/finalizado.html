<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmação</title>

<style>

*{
    box-sizing: border-box;
}

body{
    margin: 0;
    background: #d9d9d9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
}

.mobile{
    width: 390px;
    height: 844px;
    background: #f5f5f5;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,0,0,0.2);
}

.topo{
    background: #1e5eff;
    height: 120px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo{
    width: 70px;
    background: white;
    border-radius: 50%;
}

.conteudo{
    padding: 25px;
    text-align: center;
}

.titulo{
    font-size: 24px;
    font-weight: bold;
    color: #1e5eff;
    margin-top: 40px;
}

.emoji{
    font-size: 80px;
    margin: 40px 0;
}

.botao{
    display: block;
    margin-top: 40px;
    background: #1e5eff;
    color: white;
    padding: 14px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 16px;
}

</style>
</head>

<body>

<div class="mobile">

    <div class="topo">
        <img src="img/logo.png" class="logo">
    </div>

    <div class="conteudo">

        <div class="titulo">Denúncia Confirmada</div>

        <div class="emoji">👍</div>

        <a href="opcoes.html" class="botao">Voltar ao início</a>

    </div>

</div>

</body>
</html>
